name: Run hello.py

on:
  push:
    paths:
      - 'hello.py'  # Run only when this specific file changes

permissions:
  contents: read

jobs:
  run-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run hello.py
        run: python hello.py
      
      - name: check environment variables
        run: env
