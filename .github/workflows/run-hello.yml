name: Run hello.py

on:
  push:

jobs:
  run-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run hello.py
        run: python hello.py
